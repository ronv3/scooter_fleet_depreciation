version: 2

sources:
  - name: data_lake
    schema: data_lake
    description: "Seed-loaded source tables for the scooter financial DWH"
    tables:
      - name: rides
        description: "Billing/invoicing records — one row per completed scooter ride"
      - name: account_mapping
        description: >
          Journal posting rules — maps each transaction line type + country
          to the GL account code it should post to.
      - name: chart_of_accounts
        description: >
          Master chart of accounts — defines every GL account with its name,
          category (asset/liability/equity/revenue/expense) and normal side.
