name: "scooter_financial_reporting"
version: "1.0.0"
config-version: 2

profile: "scooter_financial_reporting"

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]

models:
  scooter_financial_reporting:
    +schema: warehouse
    staging:
      # stg_rides overrides to incremental via in-model config()
      # stg_chart_of_accounts and stg_account_mapping remain views (static reference data)
      +materialized: view
    intermediate:
      # int_journal_entries overrides to incremental via in-model config()
      +materialized: table
    marts:
      +materialized: table
    reports:
      # All report models override to incremental via in-model config()
      +materialized: table
seeds:
  scooter_financial_reporting:
    +schema: lake
